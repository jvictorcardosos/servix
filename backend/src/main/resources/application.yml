spring:
  application:
    name: servix-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:servix_db}
    username: ${DB_USER:servix}
    password: ${DB_PASSWORD:servix}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: company_schema
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    br.com.servix: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] [%X{tenantId}] [%X{userId}] %logger{36} - %msg%n"

servix:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-real-env}
      access-expiration: ${JWT_ACCESS_EXPIRATION:900}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
