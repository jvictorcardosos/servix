services:
  postgres:
    image: postgres:16-alpine
    container_name: servix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-servix_db}
      POSTGRES_USER: ${DB_USER:-servix}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-servix}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - servix-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-servix} -d ${DB_NAME:-servix_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  servix-postgres-data:
